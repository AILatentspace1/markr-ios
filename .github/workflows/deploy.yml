name: Deploy to App Store

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select Xcode 15.4
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Xcode version check
        run: xcodebuild -version

      - name: Set up signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo -n "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -k $KEYCHAIN_PATH

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/markr.mobileprovision

          echo "=== Signing identities found ==="
          security find-identity -v -p codesigning

          echo "=== Provisioning profile UUID ==="
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/markr.mobileprovision \
            | grep -A1 UUID | tail -1

      - name: List schemes
        run: xcodebuild -project Markr/Markr.xcodeproj -list

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project Markr/Markr.xcodeproj \
            -scheme Markr \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Markr.xcarchive \
            -destination "generic/platform=iOS"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Markr.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist Markr/ExportOptions.plist

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$API_KEY_CONTENT" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/Markr.ipa" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --verbose
